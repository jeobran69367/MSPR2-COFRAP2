<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COFRAP — {% block title %}Portail{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0E1A;
      --surface: #111827;
      --card: #1A2035;
      --border: #2A3550;
      --accent: #00D4AA;
      --accent-dim: #00966F;
      --danger: #FF4D6D;
      --text: #E2E8F0;
      --muted: #6B7A99;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    nav {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-logo span { color: var(--muted); }
    nav ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover, nav a.active { background: var(--card); color: var(--text); }
    nav a.active { border-left: 2px solid var(--accent); }
    .nav-icon { font-size: 16px; width: 18px; text-align: center; }

    /* Main */
    main {
      flex: 1;
      padding: 3rem 2.5rem;
      max-width: 720px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.4rem; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    /* Form */
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
    input[type=text], input[type=password] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 10px 14px;
      margin-bottom: 1.25rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    button[type=submit] {
      background: var(--accent);
      color: #0A0E1A;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type=submit]:hover { background: var(--accent-dim); }

    /* Alerts */
    .alert {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 1.5rem;
    }
    .alert-error { background: rgba(255,77,109,0.12); border: 1px solid var(--danger); color: var(--danger); }
    .alert-success { background: rgba(0,212,170,0.10); border: 1px solid var(--accent); color: var(--accent); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <div class="nav-logo">COF<span>RAP</span></div>
    <ul>
      <li><a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>
        <span class="nav-icon">⌂</span> Accueil
      </a></li>
      <li><a href="/create" {% if '/create' in request.url.path %}class="active"{% endif %}>
        <span class="nav-icon">+</span> Créer un compte
      </a></li>
      <li><a href="/login" {% if '/login' in request.url.path %}class="active"{% endif %}>
        <span class="nav-icon">→</span> Se connecter
      </a></li>
    </ul>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

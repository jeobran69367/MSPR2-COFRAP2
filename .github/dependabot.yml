version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"
    directory: "/functions/generate-password"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(generate-password)"

  - package-ecosystem: "pip"
    directory: "/functions/generate-2fa"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(generate-2fa)"

  - package-ecosystem: "pip"
    directory: "/functions/authenticate"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(authenticate)"

  - package-ecosystem: "pip"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(frontend)"
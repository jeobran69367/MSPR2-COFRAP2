name: Pre-merge CD

# Gate de pré-merge pour la branche main. Ce workflow tourne sur les PR
# ciblant main et exécute les vérifications CD (build, scan, e2e) avant
# qu'un merge puisse être autorisé par la protection de branche.
on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: premerge-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: cofrap

jobs:
  build:
    name: Build image (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: generate-password
            kind: function
          - component: generate-2fa
            kind: function
          - component: authenticate
            kind: function
          - component: frontend
            kind: frontend
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Installation de faas-cli
        if: matrix.kind == 'function'
        run: curl -sSL https://cli.openfaas.com | sudo sh

      - name: Récupération du template python3-http
        if: matrix.kind == 'function'
        run: faas-cli template store pull python3-http

      - name: Build de l'image de la fonction (faas-cli)
        if: matrix.kind == 'function'
        env:
          DOCKER_USER: ${{ env.IMAGE_NAMESPACE }}
        run: faas-cli build -f stack.yml --filter ${{ matrix.component }}

      - name: Build de l'image frontend (Docker classique)
        if: matrix.kind == 'frontend'
        run: docker build -t cofrap-frontend:ci ./frontend

      - name: Détermination du tag d'image local
        id: tag
        run: |
          if [[ "${{ matrix.kind }}" == "function" ]]; then
            echo "image=${{ env.IMAGE_NAMESPACE }}/cofrap-${{ matrix.component }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "image=cofrap-frontend:ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Export de l'image en tarball
        run: docker save "${{ steps.tag.outputs.image }}" -o image-${{ matrix.component }}.tar

      - name: Upload de l'artefact image
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.component }}
          path: image-${{ matrix.component }}.tar
          retention-days: 3

  scan-images:
    name: Scan sécurité (${{ matrix.component }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [generate-password, generate-2fa, authenticate, frontend]
    steps:
      - name: Checkout du dépôt (pour .trivyignore)
        uses: actions/checkout@v4

      - name: Download de l'image
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.component }}

      - name: Trivy — scan de l'archive Docker
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          trivyignores: .trivyignore
          input: image-${{ matrix.component }}.tar
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  e2e-deploy:
    name: Déploiement + tests end-to-end (Kind éphémère)
    needs: scan-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Download de toutes les images
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          merge-multiple: true

      - name: Chargement des images dans le daemon Docker local
        run: |
          for tar in image-*.tar; do
            docker load -i "$tar"
          done
          docker images

      - name: Création du cluster Kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: cofrap
          config: k8s/kind-config.yaml
          wait: 90s

      - name: Chargement des images dans le cluster Kind
        run: |
          kind load docker-image cofrap/cofrap-generate-password:latest --name cofrap
          kind load docker-image cofrap/cofrap-generate-2fa:latest --name cofrap
          kind load docker-image cofrap/cofrap-authenticate:latest --name cofrap
          kind load docker-image cofrap-frontend:ci --name cofrap

      - name: Installation de Helm
        uses: azure/setup-helm@v4

      - name: Installation de faas-cli
        run: curl -sSL https://cli.openfaas.com | sudo sh

      - name: Récupération du template python3-http
        run: faas-cli template store pull python3-http

      - name: Namespaces OpenFaaS
        run: kubectl apply -f https://raw.githubusercontent.com/openfaas/faas-netes/master/namespaces.yml

      - name: Déploiement OpenFaaS (Helm)
        run: |
          helm repo add openfaas https://openfaas.github.io/faas-netes/
          helm repo update
          kubectl -n openfaas create secret generic basic-auth \
            --from-literal=basic-auth-user=admin \
            --from-literal=basic-auth-password="ci-e2e-password" \
            --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install openfaas openfaas/openfaas \
            --namespace openfaas \
            --set functionNamespace=openfaas-fn \
            --set generateBasicAuth=false \
            --set basic_auth=true \
            --set serviceType=NodePort \
            --wait --timeout 5m

      - name: Déploiement PostgreSQL
        run: |
          kubectl apply -f k8s/postgresql/statefulset.yaml
          kubectl -n cofrap-db rollout status statefulset/postgresql --timeout=3m

      - name: Installation des dépendances Python pour le test e2e
        run: python3 -m pip install pyotp==2.9.0 bcrypt cryptography

      - name: Création des secrets applicatifs (db + clé TOTP de test)
        run: |
          kubectl -n openfaas-fn create secret generic db-host \
            --from-literal=db-host="postgresql.cofrap-db.svc.cluster.local" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n openfaas-fn create secret generic db-port \
            --from-literal=db-port="5432" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n openfaas-fn create secret generic db-name \
            --from-literal=db-name="cofrap" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n openfaas-fn create secret generic db-user \
            --from-literal=db-user="cofrap_user" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n openfaas-fn create secret generic db-password \
            --from-literal=db-password="cofrap_secure_pass_2024" \
            --dry-run=client -o yaml | kubectl apply -f -

          TOTP_KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())" 2>/dev/null || \
            docker run --rm python:3.12-slim python -c "import subprocess,sys; subprocess.run([sys.executable,'-m','pip','install','-q','cryptography']); from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          kubectl -n openfaas-fn create secret generic totp-encryption-key \
            --from-literal=totp-encryption-key="${TOTP_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Connexion faas-cli + déploiement des 3 fonctions
        env:
          DOCKER_USER: cofrap
        run: |
          echo "ci-e2e-password" | faas-cli login --gateway http://localhost:31112 --password-stdin
          faas-cli generate -f stack.yml | kubectl apply -f -
          kubectl -n openfaas-fn rollout status deployment/generate-password --timeout=3m
          kubectl -n openfaas-fn rollout status deployment/generate-2fa --timeout=3m
          kubectl -n openfaas-fn rollout status deployment/authenticate --timeout=3m
          faas-cli list --gateway http://localhost:31112

      - name: Déploiement du frontend
        run: |
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl -n cofrap-frontend rollout status deployment/frontend --timeout=2m

      - name: Attente de la disponibilité de la gateway OpenFaaS
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:31112/healthz > /dev/null; then
              echo "Gateway prête."; exit 0
            fi
            sleep 2
          done
          echo "::error::Gateway OpenFaaS indisponible après 60s"; exit 1

      - name: Test fonctionnel end-to-end
        run: |
          set -euo pipefail
          GATEWAY="http://localhost:31112"
          AUTH="admin:ci-e2e-password"
          USER="e2e.test.user"
          E2E_PASSWORD="Aa1!Aa1!Aa1!Aa1!Aa1!Aa1!"

          echo "→ generate-password"
          curl -sf -u "$AUTH" -X POST "$GATEWAY/function/generate-password" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$USER\"}" > /tmp/pwd_response.json
          python3 -c "import json; payload=json.load(open('/tmp/pwd_response.json')); assert payload.get('qr_code'), 'Réponse generate-password sans qr_code'"

          echo "→ generate-2fa"
          curl -sf -u "$AUTH" -X POST "$GATEWAY/function/generate-2fa" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$USER\"}" > /tmp/2fa_response.json
          python3 -c "import json; payload=json.load(open('/tmp/2fa_response.json')); assert payload.get('qr_code'), 'Réponse generate-2fa sans qr_code'"

          echo "→ préparation de credentials de test pour authenticate"
          TOTP_SECRET=$(python3 -c "import pyotp; print(pyotp.random_base32())")
          TOTP_KEY=$(kubectl -n openfaas-fn get secret totp-encryption-key -o jsonpath='{.data.totp-encryption-key}' | base64 -d)
          HASHED_PASSWORD=$(E2E_PASSWORD="$E2E_PASSWORD" python3 -c "import os,bcrypt; print(bcrypt.hashpw(os.environ['E2E_PASSWORD'].encode(), bcrypt.gensalt()).decode())")
          ENCRYPTED_MFA=$(TOTP_KEY="$TOTP_KEY" TOTP_SECRET="$TOTP_SECRET" python3 -c "import os; from cryptography.fernet import Fernet; print(Fernet(os.environ['TOTP_KEY'].encode()).encrypt(os.environ['TOTP_SECRET'].encode()).decode())")
          CODE=$(TOTP_SECRET="$TOTP_SECRET" python3 -c "import os,pyotp; print(pyotp.TOTP(os.environ['TOTP_SECRET']).now())")
          kubectl -n cofrap-db exec statefulset/postgresql -- \
            psql -U cofrap_user -d cofrap \
            -v username="$USER" \
            -v hashed_password="$HASHED_PASSWORD" \
            -v encrypted_mfa="$ENCRYPTED_MFA" \
            -c "UPDATE users SET password = :'hashed_password', mfa = :'encrypted_mfa', expired = 0 WHERE username = :'username';"

          echo "→ authenticate (succès attendu)"
          curl -sf -u "$AUTH" -X POST "$GATEWAY/function/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$USER\", \"password\": \"$E2E_PASSWORD\", \"totp_code\": \"$CODE\"}" | grep -Eq 'true|authenticated'

          echo "→ authenticate (échec attendu)"
          if curl -sf -u "$AUTH" -X POST "$GATEWAY/function/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$USER\", \"password\": \"wrong\", \"totp_code\": \"$CODE\"}" | grep -Eq 'true|authenticated'; then
            echo "::error::Le mauvais mot de passe n'a pas été rejeté"; exit 1
          fi


  premerge-cd-success:
    name: Pre-merge CD OK
    runs-on: ubuntu-latest
    needs: [build, scan-images, e2e-deploy]
    if: always()
    steps:
      - name: Vérifie que tous les jobs CD de pré-merge ont réussi
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::Au moins un job de pré-merge CD a échoué."
            exit 1
          fi
          echo "Tous les jobs de pré-merge CD sont au vert."

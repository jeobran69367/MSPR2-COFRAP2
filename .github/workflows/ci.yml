name: CI

# Pipeline d'intégration continue : exécuté sur chaque push et chaque
# pull request, quelle que soit la branche. Rien n'est déployé ici —
# c'est le rôle du workflow CD (cd.yml). Ce pipeline est un gate
# obligatoire : la CD ne démarre jamais si la CI n'est pas verte.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Seuil de couverture minimum exigé (%). Le build échoue en dessous.
  COVERAGE_FAIL_UNDER: "80"

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. LINT — style et qualité de code (ruff)
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation des outils de lint
        run: pip install -r requirements-dev.txt

      - name: Ruff check (fonctions + frontend)
        run: ruff check functions frontend/app frontend/tests

  # ──────────────────────────────────────────────────────────────
  # 2. TESTS UNITAIRES + COUVERTURE (gate obligatoire)
  # ──────────────────────────────────────────────────────────────
  test:
    name: Tests unitaires & couverture
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        component:
          - generate-password
          - generate-2fa
          - authenticate
          - frontend
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation des dépendances communes (tests)
        run: pip install -r requirements-dev.txt

      - name: Installation des dépendances de la fonction
        if: matrix.component != 'frontend'
        run: pip install -r functions/${{ matrix.component }}/requirements.txt

      - name: Installation des dépendances du frontend
        if: matrix.component == 'frontend'
        run: pip install -r frontend/requirements.txt

      - name: Tests + couverture — functions/${{ matrix.component }}
        if: matrix.component != 'frontend'
        run: |
          pytest functions/${{ matrix.component }} \
            --cov=functions/${{ matrix.component }} \
            --cov-report=term-missing \
            --cov-report=xml:coverage-${{ matrix.component }}.xml \
            --junitxml=junit-${{ matrix.component }}.xml

      - name: Tests + couverture — frontend
        if: matrix.component == 'frontend'
        run: |
          pytest frontend/tests \
            --cov=frontend/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-frontend.xml \
            --junitxml=junit-frontend.xml

      - name: Upload des rapports (couverture + JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.component }}
          path: |
            coverage-${{ matrix.component }}.xml
            junit-${{ matrix.component }}.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # 3. COUVERTURE GLOBALE — gate combiné sur tout le dépôt
  #    (fonctions + frontend ensemble, seuil global 80 %)
  # ──────────────────────────────────────────────────────────────
  coverage-gate:
    name: "Gate couverture globale (≥ ${{ env.COVERAGE_FAIL_UNDER }}%)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation de toutes les dépendances (app + dev)
        run: |
          pip install -r requirements-dev.txt
          pip install -r functions/generate-password/requirements.txt
          pip install -r functions/generate-2fa/requirements.txt
          pip install -r functions/authenticate/requirements.txt
          pip install -r frontend/requirements.txt

      - name: Exécution complète avec couverture combinée
        run: |
          pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }} \
            --junitxml=junit.xml

      - name: Publication du résumé de couverture dans le job summary
        if: always()
        run: |
          echo "## 📊 Couverture de tests" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rapport de couverture combiné (HTML + XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-global
          path: |
            coverage.xml
            junit.xml
            htmlcov/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # 4. SÉCURITÉ — analyse statique du code Python (bandit)
  # ──────────────────────────────────────────────────────────────
  security:
    name: Analyse de sécurité (bandit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installation de bandit
        run: pip install -r requirements-dev.txt

      - name: Bandit — rapport JSON complet (archivé, non bloquant)
        continue-on-error: true
        run: |
          bandit -r functions frontend/app \
            --exclude "*/test_*.py" \
            -f json -o bandit-report.json

      - name: Upload du rapport bandit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

      - name: Bandit — gate bloquant (échec si sévérité medium/high)
        run: |
          bandit -r functions frontend/app \
            --exclude "*/test_*.py" \
            -ll

  # ──────────────────────────────────────────────────────────────
  # 5. RÉCAPITULATIF — statut unique à référencer en branch protection
  # ──────────────────────────────────────────────────────────────
  ci-success:
    name: CI OK ✅
    runs-on: ubuntu-latest
    needs: [lint, test, coverage-gate, security]
    if: always()
    steps:
      - name: Vérifie que tous les jobs requis ont réussi
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::Au moins un job de la CI a échoué."
            exit 1
          fi
          echo "Tous les jobs CI (lint, test, coverage-gate, security) sont au vert."

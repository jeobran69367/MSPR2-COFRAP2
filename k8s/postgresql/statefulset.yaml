---
apiVersion: v1
kind: Namespace
metadata:
  name: cofrap-db

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cofrap-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cofrap-db
type: Opaque
stringData:
  POSTGRES_DB: cofrap
  POSTGRES_USER: cofrap_user
  POSTGRES_PASSWORD: cofrap_secure_pass_2024

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: cofrap-db
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id       SERIAL PRIMARY KEY,
        username VARCHAR(255) UNIQUE NOT NULL,
        password TEXT        NOT NULL,
        mfa      TEXT        NOT NULL DEFAULT '',
        gendate  BIGINT      NOT NULL DEFAULT EXTRACT(EPOCH FROM NOW())::BIGINT,
        expired  SMALLINT    NOT NULL DEFAULT 0
    );
    CREATE INDEX IF NOT EXISTS idx_users_username ON users(username);

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: cofrap-db
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init
          configMap:
            name: postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: cofrap-db
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
